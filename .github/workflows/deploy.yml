name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Flask App
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: rahuldecraj/flask-app:latest # Using your username as seen in your logs

  deploy:
    needs: build
    runs-on: self-hosted # <--- THIS tells it to run on your VirtualBox VM
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Gets the docker-compose.yml and config files onto the VM

      - name: Pull Latest Image
        run: docker pull rahuldecraj/flask-app:latest

      - name: Deploy Stack
        run: |
          # Create SSL directory if it doesn't exist for Nginx
          mkdir -p ./nginx/ssl
          # Run the full stack
          docker-compose up -d --remove-orphans
