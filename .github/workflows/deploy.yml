name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # JOB 1: Build the image on GitHub's cloud and push to Docker Hub
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Flask App
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: rahuldecraj/flask-app:latest

  # JOB 2: Connect to your Ubuntu VM (Self-Hosted Runner) and deploy
  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Prepare SSL and Directories
        run: |
          # Create the SSL directory if it doesn't exist
          mkdir -p ./nginx/ssl
          # Generate self-signed certs only if they are missing
          if [ ! -f ./nginx/ssl/selfsigned.crt ]; then
            openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
              -keyout ./nginx/ssl/selfsigned.key \
              -out ./nginx/ssl/selfsigned.crt \
              -subj "/C=US/ST=Dev/L=Dev/O=Dev/OU=Dev/CN=localhost"
          fi

      - name: Deploy Stack
        run: |
          # 1. Pull the new image we just built in the previous job
          docker-compose pull app
          # 2. Restart the containers with the new image
          docker-compose up -d --remove-orphans
          # 3. Quick health check
          docker ps
