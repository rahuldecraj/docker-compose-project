version: '3.8'

services:

app:
image: YOUR_DOCKERHUB_USERNAME/flask-app:latest
container_name: flask-app
ports:
- "5000:5000"
- "8000:8000"
networks:
- monitoring
restart: always

prometheus:
image: prom/prometheus:latest
container_name: prometheus
volumes:
- ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
ports:
- "9090:9090"
networks:
- monitoring
restart: always

grafana:
image: grafana/grafana:latest
container_name: grafana
ports:
- "3000:3000"
volumes:
- grafana-data:/var/lib/grafana
networks:
- monitoring
restart: always

node-exporter:
image: prom/node-exporter:latest
container_name: node-exporter
pid: host
volumes:
- /:/host:ro,rslave
command:
- '--path.rootfs=/host'
ports:
- "9100:9100"
networks:
- monitoring
restart: always

nginx:
image: nginx:latest
container_name: nginx
ports:
- "80:80"
- "443:443"
volumes:
- ./nginx/nginx.conf:/etc/nginx/nginx.conf
- ./nginx/ssl:/etc/nginx/ssl
depends_on:
- app
networks:
- monitoring
restart: always

networks:
monitoring:

volumes:
grafana-data:
